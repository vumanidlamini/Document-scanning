<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>AutoScan Pro - Intelligent Auto Document Scanner</title>
    <!-- TailwindCSS + Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- PDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <!-- Tesseract.js for OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }
        
        /* Fullscreen Camera Styles */
        .fullscreen-scanner {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 9999 !important;
            background: #000 !important;
            margin: 0 !important;
            padding: 0 !important;
        }
        
        .fullscreen-scanner .camera-wrapper {
            width: 100% !important;
            height: 100vh !important;
            position: relative;
            background: #000;
        }
        
        .fullscreen-scanner #cameraVideo {
            width: 100% !important;
            height: 100vh !important;
            object-fit: cover !important;
        }
        
        .fullscreen-scanner #edgeCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        
        .fullscreen-scanner .scan-guide {
            position: absolute;
            top: 10%;
            left: 5%;
            right: 5%;
            bottom: 10%;
            border: 2px dashed rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 101;
        }
        
        .fullscreen-scanner .auto-capture-status {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            padding: 14px 28px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            z-index: 10001;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            white-space: nowrap;
            font-family: monospace;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        
        .fullscreen-scanner .exit-fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10001;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            border: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            font-weight: 600;
        }
        
        .fullscreen-scanner .control-buttons {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 10001;
            padding: 0 20px;
        }
        
        .fullscreen-scanner .control-buttons button {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        
        .fullscreen-scanner .control-buttons button:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.02);
        }
        
        /* Capture flash effect */
        .capture-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            pointer-events: none;
            z-index: 20000;
            animation: flash 0.2s ease-out;
        }
        
        @keyframes flash {
            0% { opacity: 0; }
            50% { opacity: 0.8; }
            100% { opacity: 0; }
        }
        
        /* Normal mode camera */
        .camera-wrapper {
            position: relative;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            aspect-ratio: 4/3;
        }
        
        #cameraVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        #edgeCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .scan-guide-normal {
            position: absolute;
            top: 12%;
            left: 6%;
            right: 6%;
            bottom: 12%;
            border: 2px dashed rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.4);
            pointer-events: none;
        }
        
        /* Thumbnails */
        .thumb-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        
        .thumb-scroll::-webkit-scrollbar {
            height: 6px;
        }
        
        .thumb-scroll::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        
        .thumb-scroll::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }
        
        .thumb-item {
            position: relative;
            flex-shrink: 0;
            width: 85px;
            height: 85px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
            background: #f1f5f9;
        }
        
        .thumb-item.active-thumb {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.4);
        }
        
        .thumb-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .delete-thumb {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0,0,0,0.75);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
        }
        
        .delete-thumb:hover {
            background: #ef4444;
            transform: scale(1.1);
        }
        
        /* Loading spinner */
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .ocr-result {
            max-height: 180px;
            overflow-y: auto;
            font-size: 12px;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        
        /* Progress bar */
        .progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #10b981;
            border-radius: 2px;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 font-sans">

    <!-- Global Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-[9999] hidden">
        <div class="bg-white rounded-2xl p-8 text-center max-w-xs w-full shadow-2xl">
            <div class="loading-spinner mx-auto mb-4"></div>
            <p id="loadingMessage" class="text-gray-700 font-semibold">Processing...</p>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="max-w-6xl mx-auto px-4 py-5">
        <!-- Header -->
        <div class="flex flex-wrap justify-between items-center mb-6 gap-3">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-purple-600 rounded-xl flex items-center justify-center">
                    <i class="fas fa-robot text-white text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-700 to-purple-700 bg-clip-text text-transparent">AutoScan Pro</h1>
            </div>
            <div class="flex gap-2">
                <label for="galleryImport" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm shadow-md cursor-pointer flex items-center gap-2 transition">
                    <i class="fas fa-images"></i> Import
                </label>
                <input type="file" id="galleryImport" accept="image/*" multiple class="hidden">
                <button id="clearAllBtn" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl text-sm shadow-md transition flex items-center gap-2">
                    <i class="fas fa-trash"></i> Clear
                </button>
            </div>
        </div>

        <!-- Camera Section -->
        <div id="cameraSection" class="bg-white rounded-2xl shadow-xl overflow-hidden mb-6">
            <div class="camera-wrapper">
                <video id="cameraVideo" autoplay playsinline muted></video>
                <canvas id="edgeCanvas"></canvas>
                <div class="scan-guide-normal">
                    <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-blue-500"></div>
                    <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-blue-500"></div>
                    <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-blue-500"></div>
                    <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-blue-500"></div>
                </div>
            </div>
            <div class="p-4 bg-white border-t">
                <div class="flex justify-center gap-4 flex-wrap">
                    <button id="fullscreenBtn" class="bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-semibold py-3 px-8 rounded-xl shadow-lg transition flex items-center gap-2 text-lg">
                        <i class="fas fa-expand-alt"></i> Start Auto-Scan (Fullscreen)
                    </button>
                    <button id="switchCamBtn" class="bg-gray-700 hover:bg-gray-800 text-white font-semibold py-3 px-6 rounded-xl shadow-lg transition flex items-center gap-2">
                        <i class="fas fa-sync-alt"></i> Switch Camera
                    </button>
                </div>
                <div id="docStatus" class="text-center mt-3 text-sm font-medium">
                    <span class="text-blue-600"><i class="fas fa-info-circle"></i> Click "Start Auto-Scan" - camera will auto-detect and capture documents</span>
                </div>
            </div>
        </div>

        <!-- Preview Panel -->
        <div id="previewPanel" class="hidden bg-white rounded-2xl shadow-xl p-5 mb-6">
            <h3 class="font-bold text-xl text-gray-800 mb-4 flex items-center gap-2">
                <i class="fas fa-magic text-purple-600"></i> Enhance & Confirm
            </h3>
            <div class="flex flex-col lg:flex-row gap-6">
                <div class="lg:w-1/2">
                    <canvas id="previewCanvas" class="w-full rounded-xl border-2 border-gray-200 shadow-md"></canvas>
                </div>
                <div class="lg:w-1/2 space-y-4">
                    <div class="flex gap-3 flex-wrap">
                        <button id="applyKeepBtn" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-xl font-semibold transition flex items-center gap-2">
                            <i class="fas fa-check-circle"></i> Keep & Add Page
                        </button>
                        <button id="cancelPreviewBtn" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-xl font-semibold transition flex items-center gap-2">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                    </div>
                    <div class="bg-blue-50 p-3 rounded-xl border border-blue-200">
                        <p class="text-xs text-blue-800"><i class="fas fa-crop-alt"></i> Auto: Edge detection, perspective crop, grayscale, contrast + sharpening</p>
                    </div>
                    <button id="runOcrBtn" class="bg-purple-700 hover:bg-purple-800 text-white w-full py-2 rounded-xl font-semibold transition flex items-center justify-center gap-2">
                        <i class="fas fa-font"></i> Extract Text (OCR)
                    </button>
                    <div id="ocrResultPanel" class="hidden ocr-result p-3">
                        <p class="font-semibold text-gray-700 mb-2"><i class="fas fa-file-alt text-purple-600"></i> Extracted Text:</p>
                        <p id="ocrTextDisplay" class="text-gray-600 text-xs whitespace-pre-wrap break-words"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pages Management -->
        <div class="bg-white rounded-2xl shadow-xl p-5">
            <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                <h3 class="font-bold text-xl text-gray-800 flex items-center gap-2">
                    <i class="fas fa-copy"></i> Scanned Pages
                    <span class="bg-blue-100 text-blue-700 px-2 py-1 rounded-lg text-sm"><span id="pageCount">0</span> pages</span>
                </h3>
                <div class="flex gap-2">
                    <input type="text" id="pdfFileName" placeholder="Document name" class="border border-gray-300 rounded-xl px-4 py-2 text-sm w-48 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button id="previewPdfBtn" class="bg-gray-700 hover:bg-gray-800 text-white px-4 py-2 rounded-xl text-sm transition flex items-center gap-2">
                        <i class="fas fa-eye"></i> Preview
                    </button>
                    <button id="downloadPdfBtn" class="bg-gradient-to-r from-purple-600 to-purple-700 hover:from-purple-700 hover:to-purple-800 text-white font-bold px-6 py-2 rounded-xl shadow-lg transition flex items-center gap-2">
                        <i class="fas fa-download"></i> Download PDF
                    </button>
                </div>
            </div>
            <div id="thumbnailsContainer" class="thumb-scroll min-h-[100px]">
                <div class="text-gray-400 text-center w-full py-8">No pages captured yet. Start auto-scan!</div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const video = document.getElementById('cameraVideo');
        const edgeCanvas = document.getElementById('edgeCanvas');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const switchCamBtn = document.getElementById('switchCamBtn');
        const cameraSection = document.getElementById('cameraSection');
        const mainApp = document.getElementById('mainApp');
        const previewPanel = document.getElementById('previewPanel');
        const previewCanvas = document.getElementById('previewCanvas');
        const applyKeepBtn = document.getElementById('applyKeepBtn');
        const cancelPreviewBtn = document.getElementById('cancelPreviewBtn');
        const thumbnailsContainer = document.getElementById('thumbnailsContainer');
        const pageCountSpan = document.getElementById('pageCount');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const downloadPdfBtn = document.getElementById('downloadPdfBtn');
        const previewPdfBtn = document.getElementById('previewPdfBtn');
        const pdfFileNameInput = document.getElementById('pdfFileName');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingMessage = document.getElementById('loadingMessage');
        const docStatus = document.getElementById('docStatus');
        const runOcrBtn = document.getElementById('runOcrBtn');
        const ocrResultPanel = document.getElementById('ocrResultPanel');
        const ocrTextDisplay = document.getElementById('ocrTextDisplay');
        const galleryImport = document.getElementById('galleryImport');

        // State
        let currentStream = null;
        let facingMode = 'environment';
        let capturedPages = [];
        let pendingRawImage = null;
        let isProcessing = false;
        let isFullscreen = false;
        let autoScanInterval = null;
        let isAutoCapturing = false;
        let lastCaptureTime = 0;
        const CAPTURE_COOLDOWN = 2000; // 2 seconds between auto-captures

        // Helper functions
        function showLoading(msg) { loadingMessage.innerText = msg; loadingOverlay.classList.remove('hidden'); }
        function hideLoading() { loadingOverlay.classList.add('hidden'); }

        // Add flash effect
        function addFlash() {
            const flash = document.createElement('div');
            flash.className = 'capture-flash';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 300);
        }

        // Camera initialization
        async function initCamera() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            try {
                const constraints = {
                    video: { 
                        facingMode: { exact: facingMode },
                        width: { ideal: 3840 },
                        height: { ideal: 2160 }
                    }
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                video.srcObject = stream;
                await video.play();
            } catch (err) {
                console.warn(err);
                try {
                    const fallback = await navigator.mediaDevices.getUserMedia({ video: true });
                    currentStream = fallback;
                    video.srcObject = fallback;
                    await video.play();
                } catch (e) {
                    alert("Camera access denied. Please allow permissions.");
                }
            }
        }

        // Advanced document detection with quality scoring
        function detectDocumentQuality() {
            if (!video.videoWidth || video.paused) return null;
            
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(video, 0, 0);
            
            const imgData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
            const gray = new Uint8ClampedArray(tempCanvas.width * tempCanvas.height);
            for (let i = 0; i < imgData.data.length; i += 4) {
                gray[i/4] = 0.299 * imgData.data[i] + 0.587 * imgData.data[i+1] + 0.114 * imgData.data[i+2];
            }
            
            const sobelX = [-1,0,1,-2,0,2,-1,0,1];
            const sobelY = [-1,-2,-1,0,0,0,1,2,1];
            const edges = new Uint8ClampedArray(tempCanvas.width * tempCanvas.height);
            let maxGrad = 0;
            const w = tempCanvas.width, h = tempCanvas.height;
            
            for (let y = 1; y < h-1; y++) {
                for (let x = 1; x < w-1; x++) {
                    let gx = 0, gy = 0;
                    for (let ky = -1; ky <= 1; ky++) {
                        for (let kx = -1; kx <= 1; kx++) {
                            const val = gray[(y+ky)*w + (x+kx)];
                            gx += val * sobelX[(ky+1)*3 + (kx+1)];
                            gy += val * sobelY[(ky+1)*3 + (kx+1)];
                        }
                    }
                    const mag = Math.hypot(gx, gy);
                    if (mag > maxGrad) maxGrad = mag;
                    edges[y*w + x] = mag;
                }
            }
            
            const threshold = maxGrad * 0.12;
            let minX = w, minY = h, maxX = 0, maxY = 0, edgeCount = 0;
            let edgeIntensitySum = 0;
            
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const edgeVal = edges[y*w + x];
                    if (edgeVal > threshold) {
                        edgeCount++;
                        edgeIntensitySum += edgeVal;
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                    }
                }
            }
            
            const docWidth = maxX - minX;
            const docHeight = maxY - minY;
            const areaRatio = (docWidth * docHeight) / (w * h);
            const avgEdgeIntensity = edgeCount > 0 ? edgeIntensitySum / edgeCount : 0;
            
            // Quality score (0-100)
            let qualityScore = 0;
            if (edgeCount > 800 && docWidth > w * 0.25 && docHeight > h * 0.25 && areaRatio > 0.15) {
                qualityScore += 40;
                if (docWidth > w * 0.5 && docHeight > h * 0.5) qualityScore += 30;
                if (avgEdgeIntensity > maxGrad * 0.3) qualityScore += 20;
                if (edgeCount > 2000) qualityScore += 10;
            }
            
            const isDocumentValid = qualityScore >= 60;
            
            return { 
                isValid: isDocumentValid, 
                qualityScore, 
                bounds: { minX, minY, maxX, maxY }, 
                edgeCount, 
                w, h,
                areaRatio
            };
        }

        // Draw detection overlay with color based on quality
        function drawDetectionOverlay(detection) {
            if (!detection) return;
            const ctx = edgeCanvas.getContext('2d');
            edgeCanvas.width = detection.w;
            edgeCanvas.height = detection.h;
            ctx.clearRect(0, 0, edgeCanvas.width, edgeCanvas.height);
            
            let borderColor = '#ef4444'; // red - not ready
            if (detection.qualityScore >= 80) borderColor = '#10b981'; // green - perfect
            else if (detection.qualityScore >= 60) borderColor = '#f59e0b'; // yellow - good
            
            ctx.strokeStyle = borderColor;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.rect(detection.bounds.minX, detection.bounds.minY, 
                     detection.bounds.maxX - detection.bounds.minX, 
                     detection.bounds.maxY - detection.bounds.minY);
            ctx.stroke();
            
            // Add corner markers
            ctx.fillStyle = borderColor;
            const corners = [
                [detection.bounds.minX, detection.bounds.minY],
                [detection.bounds.maxX, detection.bounds.minY],
                [detection.bounds.minX, detection.bounds.maxY],
                [detection.bounds.maxX, detection.bounds.maxY]
            ];
            corners.forEach(([x, y]) => {
                ctx.fillRect(x-3, y-3, 6, 6);
            });
        }

        // Capture and process document
        async function captureAndProcess() {
            if (isProcessing || isAutoCapturing) return false;
            
            const rawCanvas = captureFrame();
            if (!rawCanvas) return false;
            
            isAutoCapturing = true;
            addFlash();
            
            showLoading('Auto-capturing & enhancing document...');
            isProcessing = true;
            
            try {
                const enhanced = await enhanceDocument(rawCanvas);
                const dataUrl = enhanced.toDataURL('image/jpeg', 0.95);
                capturedPages.push({ dataUrl, width: enhanced.width, height: enhanced.height });
                updateThumbnails();
                lastCaptureTime = Date.now();
                
                // Update status indicator
                if (isFullscreen) {
                    const statusDiv = document.querySelector('.auto-capture-status');
                    if (statusDiv) {
                        statusDiv.style.background = 'rgba(16,185,129,0.9)';
                        statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> Document Captured! <span class="progress-bar ml-3"><span class="progress-fill" style="width: 100%"></span></span>';
                        setTimeout(() => {
                            if (statusDiv) {
                                statusDiv.style.background = 'rgba(0,0,0,0.85)';
                                statusDiv.innerHTML = '<i class="fas fa-sync-alt fa-spin"></i> Auto-scan active - align next document';
                            }
                        }, 1500);
                    }
                }
                
                return true;
            } catch (err) {
                console.error(err);
                return false;
            } finally {
                hideLoading();
                isProcessing = false;
                setTimeout(() => { isAutoCapturing = false; }, 500);
            }
        }

        // Auto-scan loop
        function startAutoScan() {
            if (autoScanInterval) clearInterval(autoScanInterval);
            
            let stableFrameCount = 0;
            let lastValidBounds = null;
            let lastQualityScore = 0;
            
            autoScanInterval = setInterval(async () => {
                const now = Date.now();
                if (isProcessing || isAutoCapturing || (now - lastCaptureTime) < CAPTURE_COOLDOWN) return;
                
                const detection = detectDocumentQuality();
                
                if (detection && detection.isValid) {
                    drawDetectionOverlay(detection);
                    
                    // Update status with quality
                    if (isFullscreen) {
                        const statusDiv = document.querySelector('.auto-capture-status');
                        if (statusDiv) {
                            let qualityText = '';
                            if (detection.qualityScore >= 80) qualityText = 'Perfect - Ready!';
                            else if (detection.qualityScore >= 60) qualityText = 'Good - Hold steady';
                            else qualityText = 'Adjust document position';
                            
                            const progressWidth = Math.min(100, detection.qualityScore);
                            statusDiv.innerHTML = `<i class="fas fa-camera"></i> ${qualityText} <span class="progress-bar ml-3"><span class="progress-fill" style="width: ${progressWidth}%"></span></span>`;
                            
                            if (detection.qualityScore >= 80) {
                                statusDiv.style.background = 'rgba(16,185,129,0.85)';
                            } else if (detection.qualityScore >= 60) {
                                statusDiv.style.background = 'rgba(245,158,11,0.85)';
                            } else {
                                statusDiv.style.background = 'rgba(0,0,0,0.85)';
                            }
                        }
                    }
                    
                    // Check for stability and quality
                    const boundsKey = `${detection.bounds.minX},${detection.bounds.minY},${detection.bounds.maxX},${detection.bounds.maxY}`;
                    const isStable = lastValidBounds === boundsKey;
                    const qualityImproved = detection.qualityScore >= 75 && detection.qualityScore > lastQualityScore;
                    
                    if (isStable) {
                        stableFrameCount++;
                    } else {
                        stableFrameCount = 0;
                        lastValidBounds = boundsKey;
                    }
                    
                    lastQualityScore = detection.qualityScore;
                    
                    // Auto-capture when document is stable and has good quality (≥75)
                    if (stableFrameCount >= 3 && detection.qualityScore >= 75) {
                        await captureAndProcess();
                        stableFrameCount = 0;
                        lastValidBounds = null;
                    }
                } else {
                    if (isFullscreen) {
                        const statusDiv = document.querySelector('.auto-capture-status');
                        if (statusDiv) {
                            statusDiv.style.background = 'rgba(0,0,0,0.85)';
                            statusDiv.innerHTML = '<i class="fas fa-search"></i> Looking for document... position paper in frame';
                        }
                    }
                    stableFrameCount = 0;
                    lastValidBounds = null;
                }
            }, 200);
        }

        // Capture frame
        function captureFrame() {
            if (!video.videoWidth) return null;
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            return canvas;
        }

        // Enhance document
        async function enhanceDocument(rawCanvas) {
            return new Promise((resolve) => {
                const w = rawCanvas.width, h = rawCanvas.height;
                const canvas = document.createElement('canvas');
                canvas.width = w;
                canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(rawCanvas, 0, 0);
                
                // Grayscale
                let imgData = ctx.getImageData(0, 0, w, h);
                let data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                    data[i] = data[i+1] = data[i+2] = gray;
                }
                ctx.putImageData(imgData, 0, 0);
                
                // Contrast stretch
                imgData = ctx.getImageData(0, 0, w, h);
                data = imgData.data;
                let min = 255, max = 0;
                for (let i = 0; i < data.length; i += 4) {
                    if (data[i] < min) min = data[i];
                    if (data[i] > max) max = data[i];
                }
                const range = max - min;
                if (range > 0) {
                    for (let i = 0; i < data.length; i += 4) {
                        let newVal = ((data[i] - min) / range) * 255;
                        newVal = Math.min(255, Math.max(0, newVal));
                        data[i] = data[i+1] = data[i+2] = newVal;
                    }
                    ctx.putImageData(imgData, 0, 0);
                }
                
                // Sharpening
                const sharpenKernel = [0, -1, 0, -1, 5, -1, 0, -1, 0];
                const sharpened = applyConvolution(ctx, w, h, sharpenKernel);
                ctx.putImageData(sharpened, 0, 0);
                
                // Auto crop
                const cropped = autoCropDocument(ctx, w, h);
                if (cropped) resolve(cropped);
                else resolve(canvas);
            });
        }
        
        function applyConvolution(ctx, w, h, kernel) {
            const imgData = ctx.getImageData(0, 0, w, h);
            const out = ctx.createImageData(w, h);
            const src = imgData.data, dst = out.data;
            for (let y = 1; y < h-1; y++) {
                for (let x = 1; x < w-1; x++) {
                    let sum = 0;
                    for (let ky = -1; ky <= 1; ky++) {
                        for (let kx = -1; kx <= 1; kx++) {
                            const px = (x + kx) + (y + ky) * w;
                            sum += src[px * 4] * kernel[(ky+1)*3 + (kx+1)];
                        }
                    }
                    const idx = (x + y * w) * 4;
                    const val = Math.min(255, Math.max(0, sum));
                    dst[idx] = dst[idx+1] = dst[idx+2] = val;
                    dst[idx+3] = 255;
                }
            }
            return out;
        }
        
        function autoCropDocument(ctx, w, h) {
            const imgData = ctx.getImageData(0, 0, w, h);
            const gray = new Uint8ClampedArray(w * h);
            for (let i = 0; i < imgData.data.length; i += 4) {
                gray[i/4] = imgData.data[i];
            }
            
            const sobelX = [-1,0,1,-2,0,2,-1,0,1];
            const sobelY = [-1,-2,-1,0,0,0,1,2,1];
            const edges = new Uint8ClampedArray(w * h);
            let maxGrad = 0;
            
            for (let y = 1; y < h-1; y++) {
                for (let x = 1; x < w-1; x++) {
                    let gx = 0, gy = 0;
                    for (let ky = -1; ky <= 1; ky++) {
                        for (let kx = -1; kx <= 1; kx++) {
                            const val = gray[(y+ky)*w + (x+kx)];
                            gx += val * sobelX[(ky+1)*3 + (kx+1)];
                            gy += val * sobelY[(ky+1)*3 + (kx+1)];
                        }
                    }
                    const mag = Math.hypot(gx, gy);
                    if (mag > maxGrad) maxGrad = mag;
                    edges[y*w + x] = mag;
                }
            }
            
            const threshold = maxGrad * 0.12;
            let minX = w, minY = h, maxX = 0, maxY = 0, count = 0;
            
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    if (edges[y*w + x] > threshold) {
                        count++;
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                    }
                }
            }
            
            if (count < 100 || (maxX - minX) < w * 0.2) return null;
            
            const padding = 15;
            const cropX = Math.max(0, minX - padding);
            const cropY = Math.max(0, minY - padding);
            const cropW = Math.min(w - cropX, maxX - minX + padding * 2);
            const cropH = Math.min(h - cropY, maxY - minY + padding * 2);
            
            const cropped = document.createElement('canvas');
            cropped.width = cropW;
            cropped.height = cropH;
            const cropCtx = cropped.getContext('2d');
            cropCtx.drawImage(ctx.canvas, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
            return cropped;
        }

        async function manualEnhanceAndAdd() {
            if (!pendingRawImage) return;
            showLoading('Enhancing document...');
            isProcessing = true;
            try {
                const enhanced = await enhanceDocument(pendingRawImage);
                const dataUrl = enhanced.toDataURL('image/jpeg', 0.95);
                capturedPages.push({ dataUrl, width: enhanced.width, height: enhanced.height });
                updateThumbnails();
                cancelPreview();
            } catch (err) {
                console.error(err);
                alert('Enhancement failed');
            } finally {
                hideLoading();
                isProcessing = false;
            }
        }
        
        function cancelPreview() {
            previewPanel.classList.add('hidden');
            pendingRawImage = null;
        }
        
        async function runOCR() {
            if (!pendingRawImage) return;
            showLoading('Extracting text...');
            try {
                const { data: { text } } = await Tesseract.recognize(pendingRawImage, 'eng');
                ocrTextDisplay.innerText = text || '(No text detected)';
                ocrResultPanel.classList.remove('hidden');
            } catch (err) {
                ocrTextDisplay.innerText = 'OCR failed';
                ocrResultPanel.classList.remove('hidden');
            } finally {
                hideLoading();
            }
        }
        
        function updateThumbnails() {
            pageCountSpan.innerText = capturedPages.length;
            if (capturedPages.length === 0) {
                thumbnailsContainer.innerHTML = '<div class="text-gray-400 text-center w-full py-8">No pages captured yet. Start auto-scan!</div>';
                return;
            }
            thumbnailsContainer.innerHTML = '';
            capturedPages.forEach((page, idx) => {
                const div = document.createElement('div');
                div.className = 'thumb-item';
                const img = document.createElement('img');
                img.src = page.dataUrl;
                img.className = 'thumb-img';
                const delBtn = document.createElement('div');
                delBtn.className = 'delete-thumb';
                delBtn.innerHTML = '<i class="fas fa-times"></i>';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    capturedPages.splice(idx, 1);
                    updateThumbnails();
                };
                div.appendChild(img);
                div.appendChild(delBtn);
                thumbnailsContainer.appendChild(div);
            });
        }
        
        async function generatePDF() {
            if (capturedPages.length === 0) throw new Error('No pages');
            const { PDFDocument, StandardFonts, rgb } = PDFLib;
            const pdfDoc = await PDFDocument.create();
            const font = await pdfDoc.embedFont(StandardFonts.Helvetica);
            
            for (let i = 0; i < capturedPages.length; i++) {
                const pageData = capturedPages[i];
                const imgBytes = await fetch(pageData.dataUrl).then(r => r.arrayBuffer());
                let img;
                if (pageData.dataUrl.includes('jpeg')) img = await pdfDoc.embedJpg(imgBytes);
                else img = await pdfDoc.embedPng(imgBytes);
                const page = pdfDoc.addPage([img.width, img.height]);
                page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
                page.drawText(`Page ${i+1} of ${capturedPages.length}`, {
                    x: img.width - 90,
                    y: 20,
                    size: 10,
                    font,
                    color: rgb(0.2, 0.2, 0.2)
                });
            }
            return await pdfDoc.save();
        }
        
        async function downloadPDF() {
            if (capturedPages.length === 0) { alert('No scanned pages'); return; }
            showLoading('Generating PDF...');
            try {
                const pdfBytes = await generatePDF();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const filename = (pdfFileNameInput.value.trim() || 'scanned_document') + '.pdf';
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = filename;
                link.click();
                URL.revokeObjectURL(link.href);
            } catch (err) { alert('PDF generation failed'); } finally { hideLoading(); }
        }
        
        async function previewPDF() {
            if (capturedPages.length === 0) { alert('No pages'); return; }
            showLoading('Preparing preview...');
            try {
                const pdfBytes = await generatePDF();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                window.open(url, '_blank');
                URL.revokeObjectURL(url);
            } catch (err) { alert('Preview failed'); } finally { hideLoading(); }
        }
        
        function toggleFullscreen() {
            if (!isFullscreen) {
                cameraSection.classList.add('fullscreen-scanner');
                isFullscreen = true;
                
                // Add fullscreen UI
                const exitBtn = document.createElement('button');
                exitBtn.className = 'exit-fullscreen';
                exitBtn.innerHTML = '<i class="fas fa-times-circle"></i> Exit Auto-Scan';
                exitBtn.onclick = exitFullscreen;
                cameraSection.appendChild(exitBtn);
                
                const statusDiv = document.createElement('div');
                statusDiv.className = 'auto-capture-status';
                statusDiv.innerHTML = '<i class="fas fa-sync-alt fa-spin"></i> Auto-scan active - position document';
                cameraSection.appendChild(statusDiv);
                
                const controls = document.createElement('div');
                controls.className = 'control-buttons';
                controls.innerHTML = `
                    <button id="fsSwitchCam"><i class="fas fa-sync-alt"></i> Switch Camera</button>
                    <button id="fsManualCapture"><i class="fas fa-camera"></i> Manual Capture</button>
                `;
                cameraSection.appendChild(controls);
                
                document.getElementById('fsSwitchCam').onclick = switchCamera;
                document.getElementById('fsManualCapture').onclick = async () => {
                    if (!isProcessing) await captureAndProcess();
                };
                
                startAutoScan();
                docStatus.innerHTML = '<span class="text-green-600"><i class="fas fa-check-circle"></i> Auto-scan active! Document will be captured automatically when aligned.</span>';
            }
        }
        
        function exitFullscreen() {
            cameraSection.classList.remove('fullscreen-scanner');
            isFullscreen = false;
            if (autoScanInterval) clearInterval(autoScanInterval);
            autoScanInterval = null;
            
            const exitBtn = cameraSection.querySelector('.exit-fullscreen');
            const statusDiv = cameraSection.querySelector('.auto-capture-status');
            const controls = cameraSection.querySelector('.control-buttons');
            if (exitBtn) exitBtn.remove();
            if (statusDiv) statusDiv.remove();
            if (controls) controls.remove();
            
            docStatus.innerHTML = '<span class="text-blue-600"><i class="fas fa-info-circle"></i> Click "Start Auto-Scan" for automatic document detection & capture</span>';
        }
        
        async function switchCamera() {
            facingMode = facingMode === 'environment' ? 'user' : 'environment';
            await initCamera();
        }
        
        function clearAll() {
            if (capturedPages.length > 0 && confirm('Delete all scanned pages?')) {
                capturedPages = [];
                updateThumbnails();
            }
        }
        
        async function importFromGallery(files) {
            if (!files.length) return;
            showLoading('Importing and enhancing...');
            for (const file of files) {
                const url = URL.createObjectURL(file);
                const img = new Image();
                await new Promise((resolve) => {
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        const enhanced = await enhanceDocument(canvas);
                        capturedPages.push({ dataUrl: enhanced.toDataURL('image/jpeg', 0.95), width: enhanced.width, height: enhanced.height });
                        URL.revokeObjectURL(url);
                        resolve();
                    };
                    img.src = url;
                });
            }
            updateThumbnails();
            hideLoading();
        }
        
        // Event listeners
        fullscreenBtn.onclick = toggleFullscreen;
        switchCamBtn.onclick = switchCamera;
        applyKeepBtn.onclick = manualEnhanceAndAdd;
        cancelPreviewBtn.onclick = cancelPreview;
        runOcrBtn.onclick = runOCR;
        clearAllBtn.onclick = clearAll;
        downloadPdfBtn.onclick = downloadPDF;
        previewPdfBtn.onclick = previewPDF;
        galleryImport.onchange = (e) => {
            if (e.target.files) importFromGallery(Array.from(e.target.files));
            galleryImport.value = '';
        };
        
        // Initialize
        initCamera();
    </script>
</body>
